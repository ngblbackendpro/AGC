<div class="panel">
  <h3>Home Section Stats</h3>
  <form id="stats-form" class="grid-2">
    <div class="form-row">
      <label>Global Engagements</label>
      <input class="input" name="engagements" required />
    </div>
    <div class="form-row">
      <label>Industries Served</label>
      <input class="input" name="industries" required />
    </div>
    <div class="form-row">
      <label>Regional Partners</label>
      <input class="input" name="partners" required />
    </div>
    <div class="actions actions-end">
      <button class="btn" type="submit">Save Stats</button>
      <button class="btn warn" type="button" id="clear-stats-btn">Clear</button>
    </div>
  </form>
</div>
