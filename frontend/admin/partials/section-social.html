<div class="panel">
  <h3>Social Media Links</h3>
  <form id="social-form" class="grid-2">
    <div class="form-row">
      <label>LinkedIn</label>
      <input class="input" name="linkedin" placeholder="https://linkedin.com/company/..." />
    </div>
    <div class="form-row">
      <label>Instagram</label>
      <input class="input" name="instagram" placeholder="https://instagram.com/..." />
    </div>
    <div class="form-row">
      <label>Facebook</label>
      <input class="input" name="facebook" placeholder="https://facebook.com/..." />
    </div>
    <div class="actions actions-end">
      <button class="btn" type="submit">Save Links</button>
      <button class="btn warn" type="button" id="clear-social-btn">Clear</button>
    </div>
  </form>
</div>
