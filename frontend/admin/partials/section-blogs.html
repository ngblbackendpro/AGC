<div class="panel">
  <h3>Blog Management</h3>
  <form id="blog-form" class="grid-2">
    <input type="hidden" name="id" />
    <div class="form-row"><label>Image Upload</label><input class="input" type="file" name="imageFile" accept="image/*" /></div>
    <div class="form-row"><label>Date</label><input class="input" type="date" name="date" required /></div>
    <div class="form-row"><label>Category</label><input class="input" name="category" required /></div>
    <div class="form-row"><label>Title</label><input class="input" name="title" required /></div>
    <div class="form-row full-span"><label>Description</label><textarea class="textarea" name="description" required></textarea></div>
    <div class="actions">
      <button class="btn" type="submit">Save Blog</button>
      <button class="btn alt" type="button" id="blog-form-reset">Cancel Edit</button>
    </div>
  </form>
  <div class="table-wrap mt-12">
    <table>
      <thead>
        <tr><th>Image</th><th>Date</th><th>Title</th><th>Category</th><th>Actions</th></tr>
      </thead>
      <tbody id="blogs-table"></tbody>
    </table>
  </div>
</div>
