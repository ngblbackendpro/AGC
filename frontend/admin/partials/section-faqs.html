<div class="panel">
  <h3>FAQ Management</h3>
  <form id="faq-form" class="grid-2">
    <input type="hidden" name="id" />
    <div class="form-row"><label>Question</label><input class="input" name="question" required /></div>
    <div class="form-row full-span"><label>Answer</label><textarea class="textarea" name="answer" required></textarea></div>
    <div class="actions">
      <button class="btn" type="submit">Save FAQ</button>
      <button class="btn alt" type="button" id="faq-form-reset">Cancel Edit</button>
    </div>
  </form>
  <div class="table-wrap mt-12">
    <table>
      <thead><tr><th>Question</th><th>Actions</th></tr></thead>
      <tbody id="faq-table"></tbody>
    </table> 
  </div>
</div>
