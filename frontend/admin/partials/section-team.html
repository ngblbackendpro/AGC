<div class="panel">
  <h3>Team Members</h3>
  <form id="team-form" class="grid-2">
    <input type="hidden" name="id" />
    <div class="form-row"><label>Photo Upload</label><input class="input" type="file" name="photoFile" accept="image/*" /></div>
    <div class="form-row"><label>Name</label><input class="input" name="name" required /></div>
    <div class="form-row"><label>Designation</label><input class="input" name="designation" style="height: 140px;" placeholder="Founder and CEO" required /></div>
    <div class="form-row"><label>Role</label><textarea class="textarea" name="role" required></textarea></div>
    <div class="form-row"><label>Expertise</label><textarea class="textarea" name="expertise" required></textarea></div>
    <div class="form-row"><label>Background</label><textarea class="textarea" name="background" required></textarea></div>
    <div class="form-row"><label>Qualifications</label><textarea class="textarea" name="qualifications" required></textarea></div>
    <div class="form-row"><label>Personal</label><textarea class="textarea" name="personal" required></textarea></div>
    <div class="actions full-span">
      <button class="btn" type="submit">Save Team Member</button>
      <button class="btn alt" type="button" id="team-form-reset">Cancel Edit</button>
    </div>
  </form>
  <div class="table-wrap mt-12">
    <table>
      <thead><tr><th>Photo</th><th>Name</th><th>Designation</th><th>Actions</th></tr></thead>
      <tbody id="team-table"></tbody>
    </table>
  </div>
</div>
